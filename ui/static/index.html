<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G1 Dance Studio</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#03181c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.2"/><path d="M12 7.2v6M12 9l-4 2M12 9l4 2M12 13l-3 5M12 13l3 5"/></svg>
    </div>
    <div class="logo-txt"><b>Dance Studio</b><span>Unitree G1</span></div>
  </div>

  <div class="nav-group">
    <button class="nav-item active" data-nav="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Dashboard</button>
    <button class="nav-item" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M9 4v16"/></svg>
      Library <span class="nav-badge hidden" id="navDanceCount">0</span></button>
    <button class="nav-item" data-nav="studio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Create</button>
  </div>

  <div class="nav-group">
    <div class="nav-label">Operate</div>
    <button class="nav-item" data-nav="show">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      Show Mode</button>
    <button class="nav-item" data-nav="system">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>
      System</button>
    <button class="nav-item" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H7a1.6 1.6 0 0 0 1-1.5V1a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V7a1.6 1.6 0 0 0 1.5 1H23a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z"/></svg>
      Settings</button>
  </div>

  <div class="sidebar-foot">
    <div class="status-chip" id="footGpu">
      <span class="dot" style="background:var(--text-faint)"></span>
      <div class="sc-txt"><b>GPU</b><span>checking…</span></div>
    </div>
    <div class="cost-mini">
      <div class="cm-top"><span>Spend this run</span><b id="footCost">—</b></div>
      <div class="bar"><i id="footCostBar" style="width:0%"></i></div>
    </div>
  </div>
</aside>

<main class="main">
  <div id="banner"></div>
  <div class="topbar">
    <h2 id="pageTitle">Dashboard</h2>
    <span class="crumb" id="pageCrumb">Overview of your studio</span>
    <div class="spacer"></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <input id="search" placeholder="Search dances…">
    </div>
    <button class="btn btn-primary" data-nav="studio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>New Dance</button>
  </div>

  <div class="content">
    <section class="screen active" id="dashboard"><div class="spin"></div></section>
    <section class="screen" id="library"><div class="spin"></div></section>
    <section class="screen" id="studio"><div class="spin"></div></section>
    <section class="screen" id="show"><div class="spin"></div></section>
    <section class="screen" id="system"><div class="spin"></div></section>
    <section class="screen" id="settings"><div class="spin"></div></section>
  </div>
</main>

<div class="toast-wrap" id="toasts"></div>
<div id="modalRoot"></div>
<input type="file" id="filePicker" accept="video/*,.csv" class="hidden">

<script src="/static/app.js"></script>
</body>
</html>
